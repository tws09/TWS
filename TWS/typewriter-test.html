<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typewriter Test</title>
    <style>
        body {
            margin: 0;
            padding: 40px;
            background: #0A0A0A;
            color: white;
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 900px;
        }

        .hero-title {
            font-size: 48px;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 20px;
        }

        .gradient-text {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .status {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            font-family: monospace;
            font-size: 14px;
        }

        .status div {
            margin: 5px 0;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1 class="hero-title">
            Welcome to <span class="gradient-text">The Wolf Stack</span>
        </h1>

        <div class="status" id="status">
            <div>⏳ Waiting for typewriter to load...</div>
        </div>
    </div>

    <script src="typewriter.js"></script>

    <script>
        // Monitor console messages
        const statusDiv = document.getElementById('status');
        const originalLog = console.log;

        console.log = function (...args) {
            originalLog.apply(console, args);
            const message = args.join(' ');
            if (message.includes('Typewriter')) {
                const div = document.createElement('div');
                div.textContent = message;
                div.style.color = message.includes('✅') ? '#10b981' :
                    message.includes('❌') ? '#ef4444' : '#60a5fa';
                statusDiv.appendChild(div);
            }
        };

        // Test after 3 seconds
        setTimeout(() => {
            const heroTitle = document.querySelector('.hero-title');
            if (heroTitle) {
                const div = document.createElement('div');
                div.textContent = '✅ Hero title found: ' + heroTitle.textContent.substring(0, 50);
                div.style.color = '#10b981';
                statusDiv.appendChild(div);
            } else {
                const div = document.createElement('div');
                div.textContent = '❌ Hero title NOT found!';
                div.style.color = '#ef4444';
                statusDiv.appendChild(div);
            }
        }, 3000);
    </script>
</body>

</html>
