# Railway config for TWS frontend (use when Root Directory is set to TWS/frontend)
# Set REACT_APP_API_URL to your backend URL (e.g. https://your-backend.up.railway.app) before building.

[build]
builder = "RAILPACK"
# CI=false prevents "Treating warnings as errors" so lint/useEffect-deps warnings don't fail the build
buildCommand = "CI=false npm run build"

[deploy]
startCommand = "npm run start:prod"
healthcheckPath = "/"
healthcheckTimeout = 30
